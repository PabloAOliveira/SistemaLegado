<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <!-- Purple gradient background -->
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>

    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#g1)" />

  <!-- glass overlay to simulate glassmorphism -->
  <rect x="6" y="6" width="52" height="52" rx="10" ry="10" fill="url(#glass)" />

  <!-- centered text with drop shadow -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#ffffff"
        filter="url(#text-shadow)">SG</text>
</svg>

