{% extends "base.html" %}

{% block content %}
<h2>Nova Demanda</h2>

<form id="form-nova-demanda" method="POST" action="/nova_demanda" class="form-card glass-panel-soft">
    <div class="form-field">
        <label>Titulo:<br>
            <input type="text" name="titulo" value="{{ form_data.get('titulo', '') }}" size="50" required>
        </label>
    </div>

    <div class="form-field">
        <label>Descrição:<br>
        <textarea name="descricao" rows="5" cols="50" required>{{ form_data.get('descricao', '') }}</textarea>
        </label>
    </div>

    <div class="form-field">
        <label>Solicitante:<br>
            <select name="solicitante" required>
                <option value="">Selecione um solicitante</option>
                {% for person in people %}
                <option value="{{ person }}" {% if form_data.get('solicitante') == person %}selected{% endif %}>{{ person }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <div class="form-field">
        <label>Responsavel:<br>
            <select name="responsavel" required>
                <option value="">Selecione um responsavel</option>
                {% for person in people %}
                <option value="{{ person }}" {% if form_data.get('responsavel') == person %}selected{% endif %}>{{ person }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <div class="form-field">
        <label>Prioridade:<br>
            {% set selected_prioridade = form_data.get('prioridade', 'baixa') %}
            <select name="prioridade" required>
                <option value="baixa" {% if selected_prioridade == 'baixa' %}selected{% endif %}>Baixa</option>
                <option value="media" {% if selected_prioridade == 'media' %}selected{% endif %}>Media</option>
                <option value="alta" {% if selected_prioridade == 'alta' %}selected{% endif %}>Alta</option>
            </select>
        </label>
    </div>

    <div class="form-field">
        <label>Status:<br>
            {% set selected_status = form_data.get('status', 'aberta') %}
            <select name="status" required>
                <option value="aberta" {% if selected_status == 'aberta' %}selected{% endif %}>Aberta</option>
                <option value="concluida" {% if selected_status == 'concluida' %}selected{% endif %}>Concluida</option>
                <option value="cancelada" {% if selected_status == 'cancelada' %}selected{% endif %}>Cancelada</option>
            </select>
        </label>
    </div>

    <div class="form-actions">
        <button type="submit">Salvar</button>
        <a href="/" class="button-link button-link-muted">Cancelar</a>
    </div>
</form>

<script>
document.getElementById('form-nova-demanda').addEventListener('submit', function (event) {
    var tituloInput = this.querySelector('input[name="titulo"]');
    var descricaoInput = this.querySelector('textarea[name="descricao"]');
    var solicitanteInput = this.querySelector('select[name="solicitante"]');
    var responsavelInput = this.querySelector('select[name="responsavel"]');

    var titulo = (tituloInput.value || '').trim();
    var descricao = (descricaoInput.value || '').trim();
    var solicitante = (solicitanteInput.value || '').trim();
    var responsavel = (responsavelInput.value || '').trim();

    if (!titulo || !descricao || !solicitante || !responsavel) {
        event.preventDefault();
        alert('Preencha obrigatoriamente o Titulo, a Descricao, o Solicitante e o Responsavel antes de salvar.');

        if (!titulo) {
            tituloInput.focus();
        } else if (!descricao) {
            descricaoInput.focus();
        } else if (!solicitante) {
            solicitanteInput.focus();
        } else {
            responsavelInput.focus();
        }
    }
});
</script>

{% endblock %}
