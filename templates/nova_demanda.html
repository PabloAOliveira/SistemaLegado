{% extends "base.html" %}

{% block content %}
<h2>Nova Demanda</h2>

<form id="form-nova-demanda" method="POST" action="/nova_demanda" class="form-card glass-panel-soft">
    <div class="form-field">
        <label>Título:</label><br>
        <input type="text" name="titulo" size="50" required>
    </div>

    <div class="form-field">
        <label>Descrição:</label><br>
        <textarea name="descricao" rows="5" cols="50" required></textarea>
    </div>

    <div class="form-field">
        <label>Solicitante:</label><br>
        <input type="text" name="solicitante" required>
    </div>

    <div class="form-field">
        <label>Prioridade:</label><br>
        <select name="prioridade" required>
            <option value="baixa">Baixa</option>
            <option value="media">Média</option>
            <option value="alta">Alta</option>
        </select>
    </div>



    <div class="form-actions">
        <button type="submit">Salvar</button>
        <a href="/" class="button-link button-link-muted">Cancelar</a>
    </div>
</form>

<script>
document.getElementById('form-nova-demanda').addEventListener('submit', function (event) {
    var tituloInput = this.querySelector('input[name="titulo"]');
    var descricaoInput = this.querySelector('textarea[name="descricao"]');
    var solicitanteInput = this.querySelector('input[name="solicitante"]');

    var titulo = (tituloInput.value || '').trim();
    var descricao = (descricaoInput.value || '').trim();
    var solicitante = (solicitanteInput.value || '').trim();

    if (!titulo || !descricao || !solicitante) {
        event.preventDefault();
        alert('Preencha obrigatoriamente o Titulo, a Descricao e o Solicitante antes de salvar.');

        if (!titulo) {
            tituloInput.focus();
        } else if (!descricao) {
            descricaoInput.focus();
        } else {
            solicitanteInput.focus();
        }
    }
});
</script>

{% endblock %}
