{% extends "base.html" %}

{% block content %}
<h2>Cadastrar Solicitante</h2>

<form id="form-cadastrar-solicitante" method="POST" action="{{ url_for('cadastrar_solicitante') }}" class="form-card glass-panel-soft">
    <div class="form-field">
        <label for="nome">Nome:</label>
        <input id="nome" type="text" name="nome" value="{{ form_data.get('nome', '') }}" required>
    </div>

    <div class="form-field">
        <label for="email">Email:</label>
        <input id="email" type="email" name="email" value="{{ form_data.get('email', '') }}" required>
    </div>

    <div class="form-field">
        <label for="cargo">Cargo:</label>
        <input id="cargo" type="text" name="cargo" value="{{ form_data.get('cargo', '') }}" required>
    </div>

    <div class="form-actions">
        <button type="submit">Cadastrar</button>
        <a href="{{ url_for('solicitante') }}" class="button-link button-link-muted">Cancelar</a>
    </div>
</form>

<script>
document.getElementById('form-cadastrar-solicitante').addEventListener('submit', function (event) {
    const nomeInput = this.querySelector('input[name="nome"]');
    const emailInput = this.querySelector('input[name="email"]');
    const cargoInput = this.querySelector('input[name="cargo"]');

    const nome = (nomeInput.value || '').trim();
    const email = (emailInput.value || '').trim();
    const cargo = (cargoInput.value || '').trim();

    if (!nome || !email || !cargo) {
        event.preventDefault();
        alert('Preencha nome, email e cargo antes de cadastrar.');

        if (!nome) {
            nomeInput.focus();
        } else if (email) {
            cargoInput.focus();
        } else {
            emailInput.focus();
        }
    }
});
</script>

{% endblock %}
