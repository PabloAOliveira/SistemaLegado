<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SGDI - Sistema de Gestão de Demandas</title>

    <meta name="description" content="Plataforma centralizada para gestão, acompanhamento e resolução de demandas do SGDI.">
    <meta name="author" content="SUTITA">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="header glass-panel">
        <div class="header-inner">
            <h1><a href="{{ url_for('index') }}" aria-label="Ir para página inicial">SGDI</a></h1>
            <div class="menu">
                <a href="{{ url_for('solicitante') }}">Solicitante</a>
                <form action="/buscar" method="GET" class="search-form">
                    <label>
                        <input type="text" name="q" placeholder="Buscar">
                    </label>
                    <button type="submit">Buscar</button>
                </form>
                <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Alternar tema">Tema</button>
            </div>
        </div>
    </header>

    {% with flashes = get_flashed_messages(with_categories=true) %}
    {% if flashes %}
        <div id="toast-stack" class="toast-stack">
            {% for category, message in flashes %}
                <output class="toast toast-{{ category|default('info') }}" name="flash-message">
                    <span class="toast-text">{{ message }}</span>
                    <button type="button"
                            class="toast-close"
                            onclick="this.parentElement.remove()"
                            aria-label="Fechar mensagem">&times;</button>
                </output>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

    <main class="container glass-panel">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer glass-panel">
        <p>SGDI v2.3 - 2026</p>
    </footer>

    <script>
        (function() {
            const root = document.body;
            const toggle = document.getElementById('theme-toggle');
            const storedTheme = localStorage.getItem('sgdi-theme');
            const prefersDark = globalThis.matchMedia && globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
            let currentTheme = storedTheme || (prefersDark ? 'dark' : 'light');

            function applyTheme(theme) {
                root.dataset.theme = theme;
                if (toggle) {
                    toggle.textContent = theme === 'dark' ? 'Tema claro' : 'Tema escuro';
                }
            }

            applyTheme(currentTheme);

            if (toggle) {
                toggle.addEventListener('click', function() {
                    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('sgdi-theme', currentTheme);
                    applyTheme(currentTheme);
                });
            }

            const stack = document.getElementById('toast-stack');
            if (stack) {
                const toasts = stack.querySelectorAll('.toast');

                function dismissToast(toast) {
                    toast.classList.add('toast-hide');
                    setTimeout(function() {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                        if (!stack.querySelector('.toast')) {
                            stack.remove();
                        }
                    }, 260);
                }

                Array.prototype.forEach.call(toasts, function(toast, index) {
                    setTimeout(function() {
                        toast.classList.add('toast-show');
                    }, index * 60);

                    const closeBtn = toast.querySelector('.toast-close');
                    if (closeBtn) {
                        closeBtn.addEventListener('click', function() {
                            dismissToast(toast);
                        });
                    }

                    setTimeout(function() {
                        dismissToast(toast);
                    }, 3800 + (index * 120));
                });
            }
        })();
    </script>
</body>
</html>
