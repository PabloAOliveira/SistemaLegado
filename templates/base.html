<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGDI - Sistema de Gestão de Demandas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="header glass-panel">
        <div class="header-inner">
            <h1>SGDI</h1>
            <div class="menu">
                <a href="/">Início</a>
                <a href="/nova_demanda">Nova Demanda</a>
                <form action="/buscar" method="GET" class="search-form">
                    <input type="text" name="q" placeholder="Buscar">
                    <button type="submit">Buscar</button>
                </form>
                <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Alternar tema">Tema</button>
            </div>
        </div>
    </header>

    <main class="container glass-panel">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer glass-panel">
        <p>SGDI v1.0 - 2024</p>
    </footer>

    <script>
        (function() {
            var root = document.body;
            var toggle = document.getElementById('theme-toggle');
            var storedTheme = localStorage.getItem('sgdi-theme');
            var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            var currentTheme = storedTheme || (prefersDark ? 'dark' : 'light');

            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                if (toggle) {
                    toggle.textContent = theme === 'dark' ? 'Tema claro' : 'Tema escuro';
                }
            }

            applyTheme(currentTheme);

            if (toggle) {
                toggle.addEventListener('click', function() {
                    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('sgdi-theme', currentTheme);
                    applyTheme(currentTheme);
                });
            }
        })();
    </script>
</body>
</html>
